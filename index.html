<html manifest="NabeelOffice.cache">
<head>
<meta charset="UTF-8">
<title>Anwar - PS4 9.00 GoldHEN</title>
<style>
    body {
        background-color: #07090f;
        background-image: linear-gradient(135deg, #050914 0%, #0a1930 100%);
        color: #00e5ff;
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 28px;
        margin: 0;
        padding: 0;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }
    .info-card {
        background-color: #111424;
        padding: 40px 60px;
        border: 2px solid rgba(0, 229, 255, 0.3);
        border-radius: 15px;
        box-shadow: 0 0 30px rgba(0, 81, 255, 0.4);
        text-align: center;
    }
    h2 {
        color: #ffffff;
        font-size: 38px;
        margin-top: 0;
        margin-bottom: 25px;
        text-shadow: 0 0 10px #0051ff;
    }
</style>
<script>
try {
    history.replaceState(null,null,'index.html');
    var histlength=history.length;
    history.go(-histlength);
} catch (e) {
    console.warn("تعديل التاريخ غير مسموح في هذه البيئة (مثل المعاينة أو Blob URL): ", e);
}

function DLProgress(e){
    var msgs = document.getElementById('msgs');
    var Percent=(Math.round(e.loaded / e.total * 100));
    if(msgs) msgs.innerHTML="جاري تثبيت الكاش بدون إنترنت ... " + Percent + "%"
};

function DisplayCacheProgress(){
    var msgs = document.getElementById('msgs');
    setTimeout(function(){ if(msgs) msgs.innerHTML="تم تثبيت الكاش بنجاح!";},2000);
    setTimeout(function(){location.reload();},3000);
}

// التحقق من دعم المتصفح لخاصية applicationCache لتجنب خطأ undefined
if (typeof window.applicationCache !== 'undefined') {
    window.applicationCache.addEventListener("progress",DLProgress,false);
    window.applicationCache.oncached=function(e){DisplayCacheProgress();};
    window.applicationCache.onupdateready=function(e){DisplayCacheProgress();};
} else {
    console.warn("خاصية applicationCache غير مدعومة في هذا المتصفح.");
    window.onload = function() {
        var msgs = document.getElementById('msgs');
        if(msgs) msgs.innerHTML = "هذا المتصفح لا يدعم التخزين المؤقت. يرجى الفتح من متصفح PS4.";
    };
}
</script>
</head>
<body style="overflow:hidden">
    <div class="info-card">
        <h2>الشراع الأبيض</h2>
        <div id="msgs" style='-webkit-font-feature-settings:"tnum";font-feature-settings:"tnum";'>جاري التحقق...</div>
    </div>
</body>
</html>
