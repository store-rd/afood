<html manifest="NabeelOffice.cache">
<head>
<meta charset="UTF-8">
<title>Anwar - PS4 9.00 GoldHEN</title>
<style>
    body {
        background-color: #07090f;
        background-image: linear-gradient(135deg, #050914 0%, #0a1930 100%);
        color: #00e5ff;
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 28px;
        margin: 0;
        padding: 0;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }
    .info-card {
        background-color: #111424;
        padding: 40px 60px;
        border: 2px solid rgba(0, 229, 255, 0.3);
        border-radius: 15px;
        box-shadow: 0 0 30px rgba(0, 81, 255, 0.4);
        text-align: center;
    }
    h2 {
        color: #ffffff;
        font-size: 38px;
        margin-top: 0;
        margin-bottom: 25px;
        text-shadow: 0 0 10px #0051ff;
    }
</style>
<script>
history.replaceState(null,null,'index.html');
var histlength = history.length;
history.go(-histlength);

function DLProgress(e) {
    Percent = (Math.round(e.loaded / e.total * 100));
    msgs.innerHTML = "جاري تثبيت التفعيل بدون إنترنت ... " + Percent + "%";
}

function DisplayCacheProgress() {
    setTimeout(function() {
        msgs.innerHTML = "تم تثبيت الكاش بنجاح! يمكنك إغلاق الإنترنت الآن.";
    }, 2000);
    setTimeout(function() {
        location.reload();
    }, 4000);
}

window.applicationCache.addEventListener("progress", DLProgress, false);
window.applicationCache.oncached = function(e) { DisplayCacheProgress(); };
window.applicationCache.onupdateready = function(e) { DisplayCacheProgress(); };
</script>
</head>
<body>
    <div class="info-card">
        <h2>الشراع الأبيض</h2>
        <div id="msgs" style='-webkit-font-feature-settings:"tnum";font-feature-settings:"tnum";'>
            جاري التحقق من ملفات النظام...
        </div>
    </div>
</body>
</html>
